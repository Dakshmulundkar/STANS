# ─── Rate Limiting Zone ───────────────────────────────────────────────────────
# Defined at http context level (included in the default nginx.conf via conf.d/).
# Phase 1 stub — not applied to any location block yet.
# To activate, add `limit_req zone=api burst=20 nodelay;` to the desired location.
# Phase 2 (backend API) will activate this for API endpoints.
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security: Remove server version from headers and error pages ───────────
    server_tokens off;

    # ── Security Headers ───────────────────────────────────────────────────────
    # Prevents browsers from MIME-sniffing the content type
    add_header X-Content-Type-Options "nosniff" always;

    # Prevents the page from being embedded in an iframe (clickjacking protection)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Controls how much referrer info is sent with requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restricts access to browser features — deny camera, mic, geolocation
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # NOTE: Content-Security-Policy is intentionally omitted in Phase 1.
    # Vite-built React apps use inline scripts and styles that require unsafe-inline.
    # Person B (Phase 2) will audit the build output and add an appropriate CSP.

    # ── Block dotfile access ───────────────────────────────────────────────────
    # Denies access to .env, .git, .htaccess, etc. if present in the web root
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Health Check Endpoint ──────────────────────────────────────────────────
    # Used by Docker HEALTHCHECK, Compose health check, and CI health check job.
    # access_log off prevents health check spam in production logs.
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'healthy';
    }

    # ── Static Asset Caching ───────────────────────────────────────────────────
    # Vite generates content-hashed filenames (e.g., main.abc123.js),
    # making 1-year immutable caching safe — browsers will always get the right version.
    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Fallback Routing ───────────────────────────────────────────────────
    # React Router handles client-side navigation. Any path not matching a real
    # file falls back to index.html so the app can handle routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
